<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MatBot SAP</title>
<style>
:root{--bg:#07090f;--s1:#0d1117;--s2:#161b22;--s3:#21262d;--border:#30363d;--border2:#3d444d;--blue:#1f6feb;--blue2:#388bfd;--blue3:#58a6ff;--green:#2ea043;--green2:#3fb950;--amber:#e3b341;--red:#da3633;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--sap:#008fd3;--sapd:#003a5d}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh}
body{font-family:"Heebo",Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden}
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{background:linear-gradient(135deg,var(--sapd),var(--sap));border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.hinfo{flex:1}.hinfo h1{font-size:14px;font-weight:700}.hinfo p{font-size:10px;color:var(--text2)}
.badge{background:linear-gradient(135deg,#1a3a5c,var(--sap));color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
.chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;animation:mi .25s ease}.msg.user{flex-direction:row-reverse}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.msg.bot .av{background:linear-gradient(135deg,var(--sapd),var(--sap))}.msg.user .av{background:var(--s3);color:var(--text2)}
.bubble{max-width:calc(100% - 40px);padding:10px 13px;border-radius:10px;font-size:14px;line-height:1.6}
.msg.bot .bubble{background:var(--s2);border:1px solid var(--border);border-radius:3px 10px 10px 10px}
.msg.user .bubble{background:linear-gradient(135deg,var(--sapd),var(--blue));color:#fff;border-radius:10px 3px 10px 10px}
.sinp{width:100%;background:var(--s1);border:1.5px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:15px;direction:rtl;outline:none;margin-top:10px}
.sinp:focus{border-color:var(--blue3)}.sinp::placeholder{color:var(--text3)}
.rc{font-size:11px;color:var(--text3);margin-top:5px}
.rl{display:flex;flex-direction:column;gap:4px;margin-top:6px;max-height:260px;overflow-y:auto}
.ri{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:9px 12px;cursor:pointer;transition:all .15s;display:flex;gap:10px;align-items:flex-start}
.ri:hover{border-color:var(--blue3);background:rgba(56,139,253,.06)}
.rcode{font-family:monospace;font-size:10px;color:var(--blue3);white-space:nowrap;padding-top:2px;flex-shrink:0}
.rinfo{flex:1}.rhe{font-size:13px;font-weight:600}.ren{font-size:11px;color:var(--text2)}.rpath{font-size:10px;color:var(--text3);margin-top:3px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chip{padding:5px 12px;background:var(--s2);border:1px solid var(--border2);border-radius:20px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--blue3);color:var(--blue3)}
.aform{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;font-weight:600;color:var(--text2)}
.sft{font-family:monospace;font-size:9px;color:var(--text3);background:var(--s3);padding:1px 4px;border-radius:3px;margin-right:4px}
.req{color:var(--red)}
.fi,.fs,.fta{background:var(--s1);border:1.5px solid var(--border);border-radius:7px;padding:9px 11px;color:var(--text);font-size:14px;direction:rtl;outline:none;transition:border-color .2s;width:100%}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--blue3)}.fta{resize:vertical;min-height:56px}.fs option{background:var(--s2)}
.pb{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px}
.ps{flex:1;padding:5px 3px;text-align:center;font-size:10px;font-weight:600;color:var(--text3);background:var(--s1);border-left:1px solid var(--border)}
.ps:first-child{border-left:none}.ps.done{background:rgba(46,160,67,.1);color:var(--green2)}.ps.active{background:rgba(31,111,235,.15);color:var(--blue3)}
.stab{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.stab td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.stab td:first-child{font-family:monospace;font-size:10px;color:var(--text3);width:35%}
.stab tr:last-child td{border-bottom:none}
.vb{color:var(--blue3);font-family:monospace}.vg{color:var(--green2)}
.pbox{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px}
.phdr{background:var(--sapd);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;color:#fff}
.cbtn{background:rgba(255,255,255,.15);border:none;border-radius:4px;color:#fff;font-size:11px;padding:2px 8px;cursor:pointer}
.pbody{padding:10px;font-family:monospace;font-size:11px;line-height:1.8;max-height:220px;overflow-y:auto;direction:ltr;text-align:left;white-space:pre-wrap;word-break:break-all}
.apibox{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:monospace;font-size:11px;color:var(--text2);margin-top:6px;direction:ltr;text-align:left}
.brow{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.bp{background:var(--blue);color:#fff}.bp:hover{background:var(--blue2)}
.bs{background:var(--green);color:#fff}.bs:hover{background:var(--green2)}
.bo{background:transparent;border:1px solid var(--border2);color:var(--text2)}.bo:hover{border-color:var(--blue3);color:var(--blue3)}
.bd{background:transparent;border:1px solid var(--red);color:var(--red)}
.sok{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 12px;background:rgba(46,160,67,.08);border:1px solid var(--green);border-radius:7px;font-size:12px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sect{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;margin:10px 0 6px;display:flex;align-items:center;gap:6px}
.sect::after{content:"";flex:1;height:1px;background:var(--border)}
.ibar{flex-shrink:0;background:var(--s1);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:center}
.ibar input{flex:1;background:var(--s2);border:1.5px solid var(--blue);border-radius:9px;padding:11px 14px;color:var(--text);font-size:15px;direction:rtl;outline:none}
.ibar input:focus{border-color:var(--blue3)}
.sbtn{width:46px;height:46px;background:var(--blue);border:none;border-radius:9px;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
.imgbtn{width:46px;height:46px;background:var(--s3);border:1.5px solid var(--border2);border-radius:9px;color:var(--text2);font-size:20px;cursor:pointer;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.imgbtn:hover{border-color:var(--amber);color:var(--amber)}
.imgbtn.active{border-color:var(--amber);background:rgba(227,179,65,.12);color:var(--amber)}
.imgprev{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px;display:none;position:relative}
.imgprev img{width:100%;max-height:180px;object-fit:contain;border-radius:6px}
.imgprev .rm{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:22px;height:22px;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.aipill{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#1a3a5c,var(--sap));color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.setbtn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:color .2s}
.setbtn:hover{color:var(--text)}
.setpanel{display:none;flex-shrink:0;background:var(--s2);border-bottom:1px solid var(--border);padding:12px 14px;gap:8px;align-items:center;flex-wrap:wrap}
.setpanel.open{display:flex}
.setpanel label{font-size:12px;color:var(--text2);white-space:nowrap}
.setpanel input{flex:1;min-width:200px;background:var(--s1);border:1.5px solid var(--border2);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:monospace;outline:none;direction:ltr}
.setpanel input:focus{border-color:var(--blue3)}
.setpanel .savebtn{padding:7px 14px;background:var(--blue);border:none;border-radius:7px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.setpanel .savebtn:hover{background:var(--blue2)}
.keyok{font-size:11px;padding:3px 8px;border-radius:4px;white-space:nowrap}
.keyok.yes{background:rgba(46,160,67,.15);color:var(--green2)}
.keyok.no{background:rgba(218,54,51,.1);color:var(--red)}
@media(max-width:480px){.frow{grid-template-columns:1fr}}
</style>
</head>

</div>
<div class="setpanel" id="setpanel">

  <input type="password" id="apikey_inp" placeholder="sk-ant-api03-..." autocomplete="off" oninput="updateKeyStatus()"/>

  <input type="text" id="sap_plant_inp" placeholder="1010" style="direction:ltr;max-width:80px"/>

  <input type="text" id="sap_ekgrp_inp" placeholder="001" style="direction:ltr;max-width:80px"/>

  <span class="keyok no" id="sapstatus">SAP לא מוגדר</span>
</div>
<div class="chat" id="chat"></div>
<div class="imgprev" id="imgprev">

<div class="ibar">

  <input type="text" id="inp" placeholder="תאר פריט: דחפור, מנוע, טונר, שסתום..." autocomplete="off"/>

</div>

  if(!q||q.length<2)return[];
  var ql=q.toLowerCase();
  var toks=[];
  var parts=ql.split(" ");
  for(var i=0;i<parts.length;i++){if(parts[i].length>=2)toks.push(parts[i]);}
  var sc=[];
  for(var i=0;i<DB.length;i++){
    var item=DB[i],s=0;
    if(item.c.indexOf(q)===0)s+=100;
    if(item.h.indexOf(q)>=0)s+=80;
    if(item.e.toLowerCase().indexOf(ql)>=0)s+=60;
    for(var j=0;j<item.t.length;j++){
      var tag=item.t[j];
      if(tag===ql)s+=90;
      else if(tag.indexOf(ql)>=0||ql.indexOf(tag)>=0)s+=50;
    }
    for(var k=0;k<toks.length;k++){
      var tok=toks[k];
      if(item.h.indexOf(tok)>=0)s+=30;
      if(item.e.toLowerCase().indexOf(tok)>=0)s+=20;
      for(var l=0;l<item.t.length;l++){
        if(item.t[l].indexOf(tok)>=0||tok.indexOf(item.t[l])>=0)s+=15;
      }
    }
    if(s>0)sc.push({item:item,s:s});
  }
  sc.sort(function(a,b){return b.s-a.s;});
  return sc.slice(0,6).map(function(x){return x.item;});
}

function pkAI(enc){
  pk(enc);
  // After pk builds the form, auto-fill fields from AI result
  // Use MutationObserver to wait for fields to appear in DOM
  var ai=S.aiResult;
  if(!ai)return;
  function tryFill(){
    var filled=false;
    if(ai.manufacturer){
      var mfr=document.getElementById("a_mfr");
      if(mfr&&!mfr.value){mfr.value=ai.manufacturer;S.attrs["mfr"]=ai.manufacturer;filled=true;}
    }
    if(ai.model){
      var mdl=document.getElementById("a_mdl");
      if(mdl&&!mdl.value){mdl.value=ai.model;S.attrs["mdl"]=ai.model;filled=true;}
    }
    if(ai.spec){
      var spec=document.getElementById("a_spec");
      if(spec&&!spec.value){spec.value=ai.spec;S.attrs["spec"]=ai.spec;filled=true;}
    }
    return filled;
  }
  // Try immediately, then retry a few times
  if(!tryFill()){
    var attempts=0;
    var interval=setInterval(function(){
      if(tryFill()||++attempts>10)clearInterval(interval);
    },150);
  }
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function mkDesc(){
  var a=S.attrs;
  var parts=[];
  if(a.mfr)parts.push(a.mfr.split("/")[0].trim().substring(0,10));
  if(a.mdl)parts.push(a.mdl.substring(0,20));
  if(!parts.length)parts.push(S.cat.h.substring(0,40));
  return parts.join(" ").substring(0,40);
}

function attrImgUpload(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(",")[1];
    var mtype=file.type||"image/jpeg";
    var ocrBox=document.getElementById("ocr_hint_box");
    if(ocrBox)ocrBox.innerHTML="<div style='text-align:center;padding:8px;color:var(--blue3);font-size:13px;animation:pulse 1s infinite'>🔍 OCR via D.M.E TECH — מזהה מאפיינים...</div>";
    var catCtx=S.cat?("קטגוריה: "+S.cat.h+" ("+S.cat.c+"). חלץ: שם מוצר, יצרן, דגם, מפרט טכני, אחריות."):"חלץ פרטי מוצר מהתמונה.";
    analyzeImageWithClaude(b64,mtype,catCtx).then(function(result){

      // Extract text string from result (may be object or string)
      var txt="";
      if(typeof result==="string") txt=result;
      else if(result&&result.text) txt=result.text;
      else if(result&&result.name) txt="יצרן: "+(result.manufacturer||result.mfr||"")+" דגם: "+(result.model||result.mdl||"")+" מפרט: "+(result.spec||"");
      else txt=JSON.stringify(result);
      // Try to fill fields
      var filled=[];
      var fieldMap={
        mfr:  [/(?:יצרן|manufacturer|brand|made by)[:\s]+([^\n,;]{2,40})/i],
        mdl:  [/(?:דגם|model|part.?number|catalog)[:\s]+([^\n,;]{2,40})/i],
        spec: [/(?:מפרט|spec|specification|standard|תקן)[:\s]+([^\n,;]{2,60})/i],
        warr: [/(?:אחריות|warranty)[:\s]+(\d+)/i]
      };
      for(var fid in fieldMap){
        var el2=document.getElementById("a_"+fid);
        if(!el2)continue;
        var patterns=fieldMap[fid];
        for(var i=0;i<patterns.length;i++){
          var m=txt.match(patterns[i]);
          if(m&&m[1]&&m[1].trim().length>1){
            var val=m[1].trim().replace(/^["'\s]+|["'\s]+$/g,"");
            if(val&&val.toLowerCase()!=="n/a"){
              el2.value=val;S.attrs[fid]=val;filled.push(fid);break;
            }
          }
        }
      }
      var summary="<div class='aipill'>🔍 OCR via D.M.E TECH</div><br>";
      summary+="<div style='font-size:12px;color:var(--text2);white-space:pre-wrap;max-height:120px;overflow:auto'>"+txt.replace(/</g,"&lt;")+"</div>";
      if(filled.length>0){
        summary+="<div style='margin-top:8px;font-size:12px;color:var(--green2)'>✅ מולאו: "+filled.join(", ")+"</div>";
      } else {
        summary+="<div style='margin-top:8px;font-size:12px;color:var(--amber)'>⚠️ מלא ידנית לפי הטקסט</div>";
      }
      // Update box inside form — no new chat message, no scroll needed
      if(ocrBox){
        var statusColor=filled.length>0?"var(--green2)":"var(--amber)";
        var statusTxt=filled.length>0?"✅ מולאו: "+filled.join(", "):"⚠️ לא זוהו שדות — מלא ידנית";
        ocrBox.innerHTML=
          "<div style='font-size:11px;color:var(--text2);max-height:70px;overflow:auto;margin-bottom:6px;direction:rtl'>"+txt.replace(/</g,"&lt;")+"</div>"
          +"<div style='font-size:12px;color:"+statusColor+";margin-bottom:8px'>"+statusTxt+"</div>"
          +"<label style='cursor:pointer;display:inline-flex;align-items:center;gap:6px;background:rgba(99,179,237,.15);color:var(--blue3);border:1px solid var(--blue3);font-size:12px;padding:5px 12px;border-radius:6px'>"
          +"🔄 נסה תמונה אחרת"
          +"<input type='file' accept='image/*' style='display:none' onchange='attrImgUpload(this)'>"
          +"</label>";
      }
    }).catch(function(err){
      if(ocrBox){
        ocrBox.innerHTML=
          "<div style='color:var(--red);margin-bottom:8px'>❌ שגיאה: "+err.message+"</div>"
          +"<label style='cursor:pointer;display:inline-flex;align-items:center;gap:6px;background:var(--blue3);color:#000;font-weight:700;font-size:13px;padding:7px 16px;border-radius:6px'>"
          +"📷 OCR via D.M.E TECH 📷"
          +"<input type='file' accept='image/*' style='display:none' onchange='attrImgUpload(this)'>"
          +"</label>";
      }
    });
  };
  reader.readAsDataURL(file);
}



var currentImgB64=null;
var currentImgType=null;

function onImgSel(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var dataUrl=e.target.result;
    currentImgB64=dataUrl.split(",")[1];
    currentImgType=file.type||"image/jpeg";
    document.getElementById("imgthumb").src=dataUrl;
    document.getElementById("imgprev").style.display="block";
    document.getElementById("imgbtn").classList.add("active");
    document.getElementById("inp").placeholder="הוסף תיאור נוסף או שלח ישר...";
    addMsg("📷 תמונה נטענה! לחץ שלח ל-OCR via D.M.E TECH 🔍",false);
  };
  reader.readAsDataURL(file);
  input.value="";
}

function setImg(b64,mtype,dataUrl){
  currentImgB64=b64;
  currentImgType=mtype||"image/jpeg";
  document.getElementById("imgthumb").src=dataUrl;
  document.getElementById("imgprev").style.display="block";
  document.getElementById("imgbtn").classList.add("active");
  document.getElementById("inp").placeholder="הוסף תיאור נוסף או שלח ישר...";
}

function clearImg(){
  currentImgB64=null;
  currentImgType=null;
  document.getElementById("imgprev").style.display="none";
  document.getElementById("imgbtn").classList.remove("active");
  document.getElementById("inp").placeholder="תאר פריט: דחפור, מנוע, טונר, שסתום...";
}

// Paste from clipboard (desktop)
document.addEventListener("paste",function(e){
  var items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf("image")!==-1){
      var file=items[i].getAsFile();
      if(!file)continue;
      var reader=new FileReader();
      reader.onload=function(ev){
        var dataUrl=ev.target.result;
        setImg(dataUrl.split(",")[1],file.type||"image/png",dataUrl);
        addMsg("📷 תמונה הודבקה! לחץ שלח ל-OCR via D.M.E TECH 🔍",false);
      };
      reader.readAsDataURL(file);
      e.preventDefault();
      return;
    }
  }
});

// Drag & drop
document.addEventListener("dragover",function(e){e.preventDefault();});
document.addEventListener("drop",function(e){
  e.preventDefault();
  var files=e.dataTransfer&&e.dataTransfer.files;
  if(!files||!files.length)return;
  var file=files[0];
  if(!file.type.startsWith("image/"))return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var dataUrl=ev.target.result;
    setImg(dataUrl.split(",")[1],file.type,dataUrl);
    addMsg("📷 תמונה נטענה! לחץ שלח ל-OCR via D.M.E TECH 🔍",false);
  };
  reader.readAsDataURL(file);
});

async function analyzeImageWithClaude(b64,mtype,extraText){
  var apiKey=getKey();
  if(!apiKey){
    throw new Error("לא הוגדר API Key — לחץ על ⚙️ למעלה והכנס את המפתח שלך");
  }
  var content=[
    {type:"image",source:{type:"base64",media_type:mtype,data:b64}},
    {type:"text",text:"אתה מומחה לסיווג חומרים ב-UNSPSC ו-SAP MM. "
      +"זהה את הפריט בתמונה בצורה מפורטת ככל האפשר. "
      +"חלץ מהתמונה את כל הנתונים הנראים: שם יצרן, מספר דגם, מפרטים טכניים, צבע, גודל, וכל טקסט רלוונטי.\n\n"
      +"החזר JSON בלבד (ללא טקסט נוסף):\n"
      +"{\n"
      +"  \"name\": \"שם הפריט המלא בעברית כולל יצרן ודגם אם נראים\",\n"
      +"  \"desc\": \"תיאור טכני מפורט 15-20 מילים\",\n"
      +"  \"keywords\": [\"מילת חיפוש 1\", \"מילת חיפוש 2\", \"מילת חיפוש 3\", \"english keyword\"],\n"
      +"  \"category\": \"קטגוריה כללית\",\n"
      +"  \"manufacturer\": \"שם יצרן או ריק אם לא נראה\",\n"
      +"  \"model\": \"מספר דגם או ריק אם לא נראה\",\n"
      +"  \"spec\": \"מפרט טכני עיקרי אם נראה\"\n"
      +"}"
      +(extraText?"\n\nמידע נוסף: "+extraText:"")}
  ];
  var resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-opus-4-6",
      max_tokens:400,
      messages:[{role:"user",content:content}]
    })
  });
  if(!resp.ok){var err=await resp.text();throw new Error("API error: "+resp.status);}
  var data=await resp.json();
  var txt=data.content.map(function(x){return x.text||"";}).join("");
  // Extract JSON from response - find first { to last }
  var start=txt.indexOf("{");
  var end=txt.lastIndexOf("}");
  if(start===-1||end===-1)throw new Error("לא התקבל JSON תקין מה-AI");
  var jsonStr=txt.substring(start,end+1);
  return JSON.parse(jsonStr);
}

function hs(){
  var inp=document.getElementById("inp");
  var t=inp.value.trim();
  
  // IMAGE MODE
  if(currentImgB64){
    var imgB64=currentImgB64;
    var imgType=currentImgType;
    var extra=t;
    inp.value="";
    clearImg();
    if(extra) addMsg("📷 "+extra,true);
    else addMsg("📷 שולח תמונה ל-OCR via D.M.E TECH...",true);
    var loadId="load_"+Date.now();
    addMsg("<span id='"+loadId+"'>🔍 OCR via D.M.E TECH...</span>",false);
    analyzeImageWithClaude(imgB64,imgType,extra).then(function(result){
      var el=document.getElementById(loadId);
      if(el) el.parentElement.remove();
      
      // Store AI result for auto-fill after category selection
      S.aiResult=result;
      
      var searchQ=result.keywords.join(" ");
      var res=srch(searchQ);
      if(!res.length) res=srch(result.name);
      
      var html="<div class='aipill'>🔍 OCR via D.M.E TECH</div><br>"
        +"<strong>"+result.name+"</strong><br>"
        +"<span style='color:var(--text2);font-size:12px'>"+result.desc+"</span><br>";
      if(result.manufacturer) html+="<span style='color:var(--text3);font-size:11px'>יצרן: <strong style='color:var(--blue3)'>"+result.manufacturer+"</strong></span> &nbsp;";
      if(result.model) html+="<span style='color:var(--text3);font-size:11px'>דגם: <strong style='color:var(--blue3)'>"+result.model+"</strong></span>";
      if(result.spec) html+="<br><span style='color:var(--text3);font-size:11px'>מפרט: "+result.spec+"</span>";
      
      if(res.length){
        html+="<br><br><strong>קטגוריות UNSPSC מוצעות — בחר:</strong><div class='rl'>";
        for(var i=0;i<Math.min(res.length,5);i++){
          var r=res[i];
          var enc=encodeURIComponent(JSON.stringify(r));
          html+="<div class='ri' onclick=\"pkAI('"+enc+"')\"><div class='rcode'>"+r.c+"</div>"
            +"<div class='rinfo'><div class='rhe'>"+r.h+"</div>"
            +"<div class='ren'>"+r.e+"</div>"
            +"<div class='rpath'>"+r.sg+" › "+r.fm+"</div></div></div>";
        }
        html+="</div>";
      } else {
        html+="<br><br><em style='color:var(--amber)'>לא נמצאו קטגוריות. חפש ידנית: "+result.name+"</em>";
      }
      addMsg(html,false);
    }).catch(function(err){
      var el=document.getElementById(loadId);
      if(el) el.parentElement.remove();
      addMsg("⚠️ שגיאה בניתוח התמונה: "+err.message,false);
    });
    return;
  }
  
  if(!t)return;
  inp.value="";
  if(S.step==="search"||S.step==="done"){
    // On Enter, select first result if available
    var res=srch(t);
    if(!res.length){
      addMsg(t,true);
      addMsg("לא נמצאו תוצאות. נסה מילה אחרת.",false);
    } else if(res.length===1){
      pk(encodeURIComponent(JSON.stringify(res[0])));
    } else {
      // Results already shown in live search panel - just scroll to them
      var resEl=document.getElementById("src_res");
      if(resEl) resEl.scrollIntoView({behavior:"smooth"});
    }
  } else {
    addMsg(t,true);
    addMsg("אנא השתמש בכפתורים ☝",false);
  }
}

document.getElementById("inp").addEventListener("keydown",function(e){if(e.key==="Enter")hs();});
